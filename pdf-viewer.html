<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-book - Guia de Apoio e Proteção para Mulheres em Situação de Violência</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s ease;
        }

        button:hover {
            background: #764ba2;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .page-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #333;
        }

        .page-input {
            width: 60px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
        }

        .viewer-container {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f0f0f0;
            padding: 20px;
            max-height: 600px;
            overflow: auto;
        }

        #pdfCanvas {
            max-width: 100%;
            height: auto;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            background: white;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-weight: bold;
        }

        .error {
            color: #d32f2f;
            padding: 20px;
            text-align: center;
            background: #ffebee;
            border-radius: 6px;
        }

        footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            color: #666;
            font-size: 12px;
            border-top: 1px solid #dee2e6;
        }

        .zoom-controls {
            display: flex;
            gap: 5px;
        }

        .zoom-controls button {
            padding: 8px 12px;
            font-size: 12px;
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 20px;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .button-group,
            .zoom-controls {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            .page-info {
                justify-content: center;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📖 E-book de Proteção</h1>
            <p>Guia de Apoio e Proteção para Mulheres em Situação de Violência</p>
        </header>

        <div class="controls">
            <div class="button-group">
                <button id="prevBtn" onclick="previousPage()">← Anterior</button>
                <button id="nextBtn" onclick="nextPage()">Próxima →</button>
            </div>

            <div class="page-info">
                <label for="pageInput">Página:</label>
                <input type="number" id="pageInput" class="page-input" min="1" onchange="goToPage()" />
                <span id="totalPages"></span>
            </div>

            <div class="zoom-controls">
                <button onclick="zoomOut()">🔍−</button>
                <button onclick="resetZoom()">100%</button>
                <button onclick="zoomIn()">🔍+</button>
            </div>

            <button id="downloadBtn" onclick="downloadPDF()">⬇️ Baixar</button>
        </div>

        <div class="viewer-container">
            <div id="error" class="error" style="display: none;"></div>
            <div id="loading" class="loading" style="display: none;">Carregando PDF...</div>
            <canvas id="pdfCanvas"></canvas>
        </div>

        <footer>
            <p>Desenvolvido com ❤️ para proteger e informar</p>
        </footer>
    </div>

    <script>
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pdfDoc = null;
        let currentPage = 1;
        let scale = 1.5;
        const canvas = document.getElementById('pdfCanvas');
        const ctx = canvas.getContext('2d');

        // Carregar PDF
        async function loadPDF() {
            try {
                document.getElementById('loading').style.display = 'block';
                document.getElementById('error').style.display = 'none';
                
                pdfDoc = await pdfjsLib.getDocument('./ebook_violencia.pdf').promise;
                document.getElementById('totalPages').textContent = `de ${pdfDoc.numPages}`;
                document.getElementById('pageInput').max = pdfDoc.numPages;
                
                document.getElementById('loading').style.display = 'none';
                renderPage(currentPage);
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = `❌ Erro ao carregar PDF: ${error.message}`;
                console.error('Erro ao carregar PDF:', error);
            }
        }

        // Renderizar página
        async function renderPage(pageNum) {
            if (!pdfDoc) return;

            try {
                const page = await pdfDoc.getPage(pageNum);
                const viewport = page.getViewport({ scale: scale });

                canvas.width = viewport.width;
                canvas.height = viewport.height;

                const renderContext = {
                    canvasContext: ctx,
                    viewport: viewport
                };

                await page.render(renderContext).promise;
                currentPage = pageNum;
                document.getElementById('pageInput').value = currentPage;
                updateButtons();
            } catch (error) {
                console.error('Erro ao renderizar página:', error);
            }
        }

        // Navegação
        function previousPage() {
            if (currentPage > 1) {
                renderPage(currentPage - 1);
            }
        }

        function nextPage() {
            if (currentPage < pdfDoc.numPages) {
                renderPage(currentPage + 1);
            }
        }

        function goToPage() {
            const pageNum = parseInt(document.getElementById('pageInput').value);
            if (pageNum >= 1 && pageNum <= pdfDoc.numPages) {
                renderPage(pageNum);
            }
        }

        // Zoom
        function zoomIn() {
            scale += 0.2;
            renderPage(currentPage);
        }

        function zoomOut() {
            if (scale > 0.5) {
                scale -= 0.2;
                renderPage(currentPage);
            }
        }

        function resetZoom() {
            scale = 1.5;
            renderPage(currentPage);
        }

        // Atualizar botões
        function updateButtons() {
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === pdfDoc.numPages;
        }

        // Download
        function downloadPDF() {
            const link = document.createElement('a');
            link.href = './ebook_violencia.pdf';
            link.download = 'ebook_violencia.pdf';
            link.click();
        }

        // Navegação por teclado
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') previousPage();
            if (e.key === 'ArrowRight') nextPage();
        });

        // Carregar ao abrir
        window.addEventListener('load', loadPDF);
    </script>
</body>
</html>
