<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guia de Apoio e Proteção</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background: #1a0a2e;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    overflow-x: hidden;
}

h1 {
    color: #d8b4fe;
    margin: 10px;
    text-align: center;
    font-size: 1rem;
}

#flipbook {
    width: 100%;
    max-width: 500px;
    display: flex;
    justify-content: center;
}

.page { position: relative; }
.page img { width: 100%; height: 100%; object-fit: contain; }
.page a { position: absolute; display: block; }

.controls {
    margin: 10px;
    display: flex;
    gap: 20px;
    align-items: center;
}

button {
    background: #7c3aed;
    border: none;
    padding: 10px 20px;
    color: white;
    cursor: pointer;
    border-radius: 8px;
    font-size: 1rem;
}

span { color: #ddd; }
</style>

</head>
<body>

<h1>📖 Guia de Apoio e Proteção para Mulheres</h1>

<div id="flipbook">

    <div class="page">
        <img src="pages/page_1.png">
    </div>

    <div class="page">
        <img src="pages/page_2.png">
        <a href="tel:190" style="top:45%; left:20%; width:60%; height:15%;"></a>
        <a href="tel:180" style="top:60%; left:20%; width:60%; height:15%;"></a>
    </div>

    <div class="page">
        <img src="pages/page_3.png">
        <a href="https://www.policiacivil.rj.gov.br/atendimentoMulherUnidades" target="_blank"
           style="top:40%; left:10%; width:80%; height:20%;"></a>
        <a href="https://delegaciaonline.pcivil.rj.gov.br/" target="_blank"
           style="top:65%; left:10%; width:80%; height:20%;"></a>
    </div>

    <div class="page">
        <img src="pages/page_4.png">
        <a href="https://play.google.com/store/apps/details?id=penhas.com.br" target="_blank"
           style="bottom:20%; left:10%; width:35%; height:20%;"></a>
        <a href="https://apps.apple.com/br/app/penhas/id1441569466" target="_blank"
           style="bottom:20%; right:10%; width:35%; height:20%;"></a>
    </div>

    <div class="page">
        <img src="pages/page_5.png">
        <a href="https://carioca.rio/servicos/casa-da-mulher-carioca/" target="_blank"
           style="top:30%; left:10%; width:80%; height:20%;"></a>
        <a href="http://www.policiacivil.rj.gov.br/atendimentoMulherRedes" target="_blank"
           style="top:55%; left:10%; width:80%; height:20%;"></a>
    </div>

    <div class="page">
        <img src="pages/page_6.png">
    </div>

    <div class="page">
        <img src="pages/page_7.png">
    </div>

</div>

<div class="controls">
    <button onclick="pageFlip.flipPrev()">◀</button>
    <span id="page-info">Página 1 de 7</span>
    <button onclick="pageFlip.flipNext()">▶</button>
</div>

<script src="https://unpkg.com/page-flip/dist/js/page-flip.browser.js"></script>

<script>

const totalPages = 7;

// Calcula tamanho com base na tela, ocupando bem o celular
const padding = 20;
const w = Math.min(window.innerWidth - padding, 500);
const h = Math.min(w * 1.42, window.innerHeight - 120);

const pageFlip = new St.PageFlip(document.getElementById("flipbook"), {
    width:  w,
    height: h,
    size:   "stretch",
    showCover:          true,
    usePortrait:        true,
    flippingMode:       "hard",   // evita dobra estranha em tela pequena
    maxShadowOpacity:   0.5,
    startPage:          0,
    disableFlipByClick: true,

    // FORÇAR modo retrato (1 página) em QUALQUER largura
    useMouseEvents: true,
    autoSize:       true
});

pageFlip.loadFromHTML(document.querySelectorAll(".page"));
pageFlip.flip(0);

const pageInfo = document.getElementById("page-info");

function updatePageInfo() {
    const current = pageFlip.getCurrentPageIndex() + 1;
    pageInfo.textContent = `Página ${current} de ${totalPages}`;
}

pageFlip.on("flip", updatePageInfo);

document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight") pageFlip.flipNext();
    if (e.key === "ArrowLeft")  pageFlip.flipPrev();
});

updatePageInfo();

</script>

</body>
</html>
