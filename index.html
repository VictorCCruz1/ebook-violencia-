<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> </title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background: #1a0a2e;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    overflow-x: hidden;
}

h1 {
    color: #d8b4fe;
    margin: 2px 0;
    padding: 0;
    text-align: center;
    font-size: 1rem;
    line-height: 1;
}

#flipbook {
    width: 100%;
    display: flex;
    justify-content: center;
    position: relative;
    height: calc(100vh - 80px); /* deixa espaço pros botões */
    max-height: 85vh;
    overflow: hidden;
}

.controls {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 20px;
    align-items: center;
    z-index: 100;
}

button {
    background: #7c3aed;
    border: none;
    padding: 10px 20px;
    color: white;
    cursor: pointer;
    border-radius: 8px;
    font-size: 1rem;
}

span { color: #ddd; }
</style>

</head>
<body>

<h1>📖</h1>

<div id="flipbook">

    <div class="page">
        <img src="pages/page_1.png">
    </div>

    <div class="page">
        <img src="pages/page_2.png">
        <a href="tel:190" style="top:45%; left:20%; width:60%; height:15%;"></a>
        <a href="tel:180" style="top:60%; left:20%; width:60%; height:15%;"></a>
    </div>

    <div class="page">
        <img src="pages/page_3.png">
        <a href="https://www.policiacivil.rj.gov.br/atendimentoMulherUnidades" target="_blank"
           style="top:40%; left:10%; width:80%; height:20%;"></a>
        <a href="https://delegaciaonline.pcivil.rj.gov.br/" target="_blank"
           style="top:65%; left:10%; width:80%; height:20%;"></a>
    </div>

    <div class="page">
        <img src="pages/page_4.png">
        <a href="https://play.google.com/store/apps/details?id=penhas.com.br" target="_blank"
           style="bottom:20%; left:10%; width:35%; height:20%;"></a>
        <a href="https://apps.apple.com/br/app/penhas/id1441569466" target="_blank"
           style="bottom:20%; right:10%; width:35%; height:20%;"></a>
    </div>

    <div class="page">
        <img src="pages/page_5.png">
        <a href="https://carioca.rio/servicos/casa-da-mulher-carioca/" target="_blank"
           style="top:30%; left:10%; width:80%; height:20%;"></a>
        <a href="http://www.policiacivil.rj.gov.br/atendimentoMulherRedes" target="_blank"
           style="top:55%; left:10%; width:80%; height:20%;"></a>
    </div>

    <div class="page">
        <img src="pages/page_6.png">
    </div>

    <div class="page">
        <img src="pages/page_7.png">
    </div>

</div>

<div class="controls">
    <button id="btn-prev">◀</button>
    <span id="page-info">Página 1 de 7</span>
    <button id="btn-next">▶</button>
</div>

<script src="https://unpkg.com/page-flip/dist/js/page-flip.browser.js"></script>

<script>

const totalPages = 7;

// Calcula para ocupar bem a tela, mas forçando uma página só
const maxW = Math.min(window.innerWidth * 0.95, 550); // limita a largura
const maxH = window.innerHeight * 0.82;

const pageFlip = new St.PageFlip(document.getElementById("flipbook"), {
    width: maxW,
    height: maxH,

    size: "stretch",
    minWidth: 300,
    maxWidth: 550,
    minHeight: 400,
    maxHeight: 900,

    drawShadow: false,
    flippingTime: 600,

    usePortrait: true,
    useLandscape: false,

    showCover: true,
    startPage: 0,

    disableFlipByClick: true
});

pageFlip.updateState({orientation: "portrait"});

pageFlip.loadFromHTML(document.querySelectorAll(".page"));
pageFlip.flip(0);

const pageInfo = document.getElementById("page-info");

function updatePageInfo() {
    const current = pageFlip.getCurrentPageIndex() + 1;
    pageInfo.textContent = `Página ${current} de ${totalPages}`;
}

pageFlip.on("flip", updatePageInfo);

document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight") pageFlip.flipNext();
    if (e.key === "ArrowLeft")  pageFlip.flipPrev();
});

updatePageInfo();

document.getElementById("btn-prev").addEventListener("click", () => {
    pageFlip.flipPrev();
});

document.getElementById("btn-next").addEventListener("click", () => {
    pageFlip.flipNext();
});

</script>

</body>
</html>
