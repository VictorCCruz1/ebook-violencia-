<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Guia de Apoio e Proteção para Mulheres</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#1a0a2e;
    font-family:Arial,sans-serif;

    display:flex;
    flex-direction:column;
    align-items:center;

    width:100%;
    height:100vh;

    overflow:hidden;
}

/* título */
h1{
    color:#d8b4fe;
    margin:8px 0;
    font-size:1.1rem;
    flex-shrink:0;
}

/* área principal */
#book-container{
    flex:1;

    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;
    padding:10px;
}

/* flipbook */
#flipbook{
    width:100%;
    max-width:500px;
    height:100%;
    max-height:800px;
}

/* páginas */
.page{
    background:#000;
    position:relative;
    overflow:hidden;
}

/* imagem */
.page img{
    width:100%;
    height:100%;
    object-fit:contain;
    user-select:none;
    pointer-events:none;
}

/* links clicáveis */
.page a{
    position:absolute;
    display:block;
    z-index:10;
    border: 2px solid rgba(255,0,0,0.4);
}

/* controles */
.controls{
    padding:10px;
    display:flex;
    align-items:center;
    gap:20px;
    flex-shrink:0;
}

button{
    background:#7c3aed;
    color:white;

    border:none;
    border-radius:8px;

    padding:10px 22px;
    font-size:1rem;

    cursor:pointer;
}

button:active{
    background:#6d28d9;
}

#page-info{
    color:#fff;
}

/* celular */
@media (max-width: 600px){

    h1{
        font-size:1rem;
    }

    #flipbook{
        max-width:100%;
        max-height:100%;
    }

    button{
        padding:10px 18px;
        font-size:0.95rem;
    }
}
</style>
</head>

<body>

<h1>📖</h1>

<div id="book-container">

<div id="flipbook">

    <div class="page">
        <img src="pages/page_1.png">
    </div>

    <div class="page">
        <img src="pages/page_2.png">

        <a href="tel:190" style="top:23%; left:67%; width:20%; height:13%;"></a>
        <a href="tel:180" style="top:40%; left:12%; width:20%; height:13%;"></a>
        <a href="tel:192" style="top:57%; left:67%; width:20%; height:13%;"></a>
        <a href="tel:197" style="top:74%; left:12%; width:20%; height:13%;"></a>
    </div>

    <div class="page">
        <img src="pages/page_3.png">
        <a href="https://www.policiacivil.rj.gov.br/atendimentoMulherUnidades" style="top:34.5%; left:63.5%; width:20%; height:13%;"></a>
        <a href="https://delegaciaonline.pcivil.rj.gov.br/" style="top:63.5%; left:64.5%; width:20%; height:13%;""></a>
    </div>

    <div class="page">
        <img src="pages/page_4.png">
        <a href="https://play.google.com/store/apps/details?id=penhas.com.br&pcampaignid=web_share" style="top:53.5%; left:50%; width:36%; height:20%;"></a>
        <a href="https://apps.apple.com/br/app/penhas/id1441569466" style="top:53.5%; left:13%; width:36%; height:20%;"></a>    
    </div>

    <div class="page">
        <img src="pages/page_5.png">
        <a href="https://carioca.rio/servicos/casa-da-mulher-carioca/" target="_blank" style="top:29.7%; left:45.5%; width:40%; height:4%;"></a>
        <a href="http://www.policiacivil.rj.gov.br/atendimentoMulherRedes" target="_blank" style="top:48.5%; left:15.5%; width:40%; height:4%;"></a>
        <a href="https://mulher.prefeitura.rio/centro-especializado-de-atendimento-a-mulher/" target="_blank" style="top:67%; left:45%; width:40%; height:4%;"></a>
        <a href="https://sistemas.rj.def.br/publico/sarova.ashx/Portal/sarova/imagem-dpge/public/arquivos/mapa_atendimento.pdf" target="_blank" style="top:85.5%; left:15%; width:40%; height:4%;"></a>
    </div>

    <div class="page">
        <img src="pages/page_6.png">
    </div>

    <div class="page">
        <img src="pages/page_7.png">
    </div>

</div>

</div>

<div class="controls">
    <button id="btn-prev">◀</button>
    <span id="page-info">Página 1 de 7</span>
    <button id="btn-next">▶</button>
</div>

<script src="https://unpkg.com/page-flip/dist/js/page-flip.browser.js"></script>

<script>
const TOTAL_PAGES = 7;

const pageFlip = new St.PageFlip(
    document.getElementById("flipbook"),
    {
        width: 400,
        height: 600,

        size: "stretch",

        minWidth: 280,
        maxWidth: 500,

        minHeight: 420,
        maxHeight: 800,

        maxShadowOpacity: 0.3,

        showCover: true,

        mobileScrollSupport: false,

        usePortrait: true,

        autoSize: true,

        drawShadow: true,

        flippingTime: 600,

        startPage: 0,

        swipeDistance: 30
    }
);

pageFlip.loadFromHTML(
    document.querySelectorAll(".page")
);

/* indicador */
const pageInfo = document.getElementById("page-info");

function updatePageInfo(){
    const current =
        pageFlip.getCurrentPageIndex() + 1;

    pageInfo.textContent =
        `Página ${current} de ${TOTAL_PAGES}`;
}

pageFlip.on("flip", updatePageInfo);

updatePageInfo();

/* botões */
document
.getElementById("btn-prev")
.addEventListener("click", () => {
    pageFlip.flipPrev();
});

document
.getElementById("btn-next")
.addEventListener("click", () => {
    pageFlip.flipNext();
});

/* teclado */
document.addEventListener("keydown", (e) => {

    if(e.key === "ArrowRight"){
        pageFlip.flipNext();
    }

    if(e.key === "ArrowLeft"){
        pageFlip.flipPrev();
    }
});

/* responsivo ao redimensionar */
window.addEventListener("resize", () => {
    pageFlip.update();
});
</script>

</body>
</html>
